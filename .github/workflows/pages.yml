name: Deploy portfolio (GitHub Pages)

# Publishes portfolio/ to GitHub Pages. The static landing page has no build step —
# we just upload the folder as-is. Runs on push to main when portfolio/ changes.
on:
  push:
    branches: [main]
    paths: ["portfolio/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio
      - id: deployment
        uses: actions/deploy-pages@v4
